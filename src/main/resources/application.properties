spring.application.name=synapse-qe

# Neon PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://ep-blue-field-abquz479.eu-west-2.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security / Neon Auth
spring.security.oauth2.resourceserver.jwt.issuer-uri=${NEON_AUTH_ISSUER_URI}
